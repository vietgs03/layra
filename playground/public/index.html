<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Layra Playground — diagrams at the speed of thought</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<!-- Loading overlay: shown until the WASM engine finishes initializing.
     Removed by app.js once init() resolves. -->
<div id="boot" class="boot" role="status" aria-live="polite" aria-label="Loading Layra">
  <div class="boot-inner">
    <span class="boot-logo" aria-hidden="true">◆</span>
    <span class="boot-spinner" aria-hidden="true"></span>
    <span class="boot-text">Starting the diagram engine…</span>
  </div>
</div>
<header role="banner">
  <div class="brand">
    <span class="logo">◆</span> <strong>Layra</strong>
    <span class="tag"><span id="perf" aria-hidden="true">—</span></span>
  </div>
  <div class="switcher" id="switcher">
    <div class="menu" id="new-menu">
      <button id="btn-new" class="menu-trigger" aria-haspopup="true" aria-expanded="false" title="Start a new diagram of any type">
        <span class="new-plus" aria-hidden="true">＋</span> New<span class="new-current"></span> <span class="caret">▾</span>
      </button>
      <div class="menu-list new-list" id="new-list" role="menu" aria-label="New diagram type" hidden></div>
    </div>
  </div>
  <div class="actions" role="toolbar" aria-label="Diagram actions">
    <button id="btn-examples" title="Browse example diagrams">Examples</button>
    <button id="btn-animate" class="icon-btn" title="Animate edges (A)" aria-label="Animate edges" aria-pressed="false">⇝</button>
    <button id="btn-theme" class="icon-btn" title="Toggle dark mode (D)" aria-label="Toggle dark mode" aria-pressed="false">🌓</button>
    <button id="btn-share" title="Copy shareable link">Share</button>
    <div class="menu" id="export-menu">
      <button id="btn-export" class="menu-trigger" aria-haspopup="true" aria-expanded="false" title="Export diagram">
        Export <span class="caret">▾</span>
      </button>
      <div class="menu-list" id="export-list" role="menu" hidden>
        <button role="menuitem" data-export="svg">SVG</button>
        <button role="menuitem" data-export="png-1">PNG · 1×</button>
        <button role="menuitem" data-export="png-2">PNG · 2×</button>
        <button role="menuitem" data-export="png-4">PNG · 4×</button>
        <div class="menu-sep"></div>
        <button role="menuitem" data-export="copy-png">Copy PNG to clipboard</button>
      </div>
    </div>
  </div>
</header>

<main id="main">
  <section class="pane editor-pane" id="editor-pane" aria-label="Editor">
    <aside class="palette" id="palette" aria-label="Shape and icon palette">
      <button class="palette-toggle" id="palette-toggle" title="Toggle palette" aria-label="Toggle palette" aria-expanded="true">⊟</button>
      <div class="palette-body" id="palette-body" role="group" aria-label="Insertable shapes, connectors and infra icons">
        <div class="palette-hint" id="palette-hint">Click to insert · drag onto the canvas</div>
        <div class="palette-group">
          <div class="palette-group-title">Shapes</div>
          <button class="palette-item" draggable="true" data-snip="rect" title="Process (rectangle)"><span class="pi-glyph">▭</span><span class="pi-label">Process</span></button>
          <button class="palette-item" draggable="true" data-snip="rounded" title="Rounded box"><span class="pi-glyph">▢</span><span class="pi-label">Rounded</span></button>
          <button class="palette-item" draggable="true" data-snip="stadium" title="Terminal / start-end (stadium)"><span class="pi-glyph">⬭</span><span class="pi-label">Terminal</span></button>
          <button class="palette-item" draggable="true" data-snip="decision" title="Decision (diamond)"><span class="pi-glyph">◇</span><span class="pi-label">Decision</span></button>
          <button class="palette-item" draggable="true" data-snip="database" title="Database (cylinder)"><span class="pi-glyph">⛁</span><span class="pi-label">Database</span></button>
          <button class="palette-item" draggable="true" data-snip="queue" title="Queue (hexagon)"><span class="pi-glyph">⬡</span><span class="pi-label">Queue</span></button>
          <button class="palette-item" draggable="true" data-snip="circle" title="Circle"><span class="pi-glyph">◯</span><span class="pi-label">Circle</span></button>
          <button class="palette-item" draggable="true" data-snip="subgraph" title="Subgraph container"><span class="pi-glyph">⬚</span><span class="pi-label">Subgraph</span></button>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">Connectors</div>
          <button class="palette-item" draggable="true" data-snip="arrow" title="Arrow edge"><span class="pi-glyph">→</span><span class="pi-label">Arrow</span></button>
          <button class="palette-item" draggable="true" data-snip="labeled" title="Labeled edge"><span class="pi-glyph">⇥</span><span class="pi-label">Labeled</span></button>
          <button class="palette-item" draggable="true" data-snip="dashed" title="Dashed (async) edge"><span class="pi-glyph">⇢</span><span class="pi-label">Dashed</span></button>
          <button class="palette-item" draggable="true" data-snip="thick" title="Thick (hot path) edge"><span class="pi-glyph">⇒</span><span class="pi-label">Thick</span></button>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">Infra</div>
          <div class="palette-infra" id="palette-infra"></div>
        </div>
      </div>
    </aside>
    <div class="editor-col">
      <div class="editor-bar">
        <span class="editor-bar-label">EDITOR</span>
        <span id="type-badge" class="type-badge" data-type="">—</span>
      </div>
      <div class="editor-scroll" id="editor-scroll">
        <div class="gutter" id="gutter" aria-hidden="true"></div>
        <textarea id="editor" spellcheck="false" autocapitalize="off" autocomplete="off"
          aria-label="Diagram source editor" aria-describedby="status" aria-invalid="false"></textarea>
      </div>
      <div id="status" class="status ok" role="status" aria-live="polite">ready</div>
    </div>
  </section>
  <div id="splitter" role="separator" aria-orientation="vertical" tabindex="0"
    aria-label="Resize editor and preview" title="Drag to resize (←/→ to adjust)"></div>
  <section class="pane preview-pane" id="preview-pane" aria-label="Diagram preview">
    <div id="viewport" role="application" aria-label="Diagram canvas — drag to pan, scroll to zoom" tabindex="0"><div id="preview"></div></div>
    <div id="minimap" class="minimap" hidden role="navigation" aria-label="Diagram minimap — drag to navigate" title="Drag to navigate">
      <div id="minimap-canvas" aria-hidden="true"></div>
      <div id="minimap-view" aria-hidden="true"></div>
    </div>
    <div class="zoom-controls" role="group" aria-label="Zoom controls">
      <button id="zoom-out" title="Zoom out (−)" aria-label="Zoom out">−</button>
      <span id="zoom-level" aria-live="polite" aria-label="Zoom level">100%</span>
      <button id="zoom-in" title="Zoom in (+)" aria-label="Zoom in">+</button>
      <button id="zoom-fit" title="Fit to view (0)" aria-label="Fit to view">Fit</button>
    </div>
  </section>
</main>

<!-- Examples gallery: starter diagrams (one per type + AWS architecture).
     Shown on first load / empty editor, or via the Examples button. -->
<div id="gallery" class="gallery" hidden>
  <div class="gallery-backdrop"></div>
  <div class="gallery-panel" role="dialog" aria-modal="true" aria-labelledby="gallery-title">
    <div class="gallery-head">
      <div>
        <h2 id="gallery-title">Start with an example</h2>
        <p class="gallery-sub">Pick a starting point — every diagram is fully editable.</p>
      </div>
      <button id="gallery-close" class="gallery-close" aria-label="Close gallery" title="Close (Esc)">✕</button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="gallery-foot">
      <button id="gallery-blank" class="gallery-blank">Start from a blank canvas</button>
    </div>
  </div>
</div>

<!-- Command palette (Cmd/Ctrl+K): a searchable list of actions with
     arrow-key navigation, focus trap, and Esc to close. -->
<div id="cmdk" class="cmdk" hidden>
  <div class="cmdk-backdrop"></div>
  <div class="cmdk-panel" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cmdk-search">
      <span class="cmdk-search-icon" aria-hidden="true">⌘</span>
      <input id="cmdk-input" type="text" role="combobox" aria-expanded="true"
        aria-controls="cmdk-list" aria-autocomplete="list" autocomplete="off"
        spellcheck="false" placeholder="Type a command…" />
      <kbd class="cmdk-esc">esc</kbd>
    </div>
    <div id="cmdk-list" class="cmdk-list" role="listbox" aria-label="Commands"></div>
    <div class="cmdk-empty" id="cmdk-empty" hidden>No matching commands</div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
