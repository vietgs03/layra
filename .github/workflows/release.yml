name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: layra-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: layra-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: layra-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

      - name: Build CLI
        run: cargo build --release -p layra-cli --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          cp "target/${{ matrix.target }}/release/layra${ext}" "${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: layra-*
          generate_release_notes: true

  npm:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build package
        run: packages/core/build.sh

      - name: Smoke test
        run: node packages/core/test/smoke.mjs

      - name: Build VS Code extension
        run: |
          packages/vscode/build.sh
          cd packages/vscode && npx --yes @vscode/vsce package --no-dependencies

      - name: Attach vsix to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode/*.vsix

      - name: Publish to npm (when NPM_TOKEN is configured)
        working-directory: packages/core
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npm publish --access public
          else
            echo "NPM_TOKEN secret not set; skipping publish (package built + tested)."
            npm pack
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
