<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Layra Playground — diagrams at the speed of thought</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">◆</span> <strong>Layra</strong>
    <span class="tag"><span id="perf">—</span></span>
  </div>
  <div class="templates" id="templates">
    <button data-tpl="flowchart">Flowchart</button>
    <button data-tpl="sequence">Sequence</button>
    <button data-tpl="state">State</button>
    <button data-tpl="class">Class</button>
    <button data-tpl="er">ER</button>
    <button data-tpl="gantt">Gantt</button>
    <button data-tpl="pie">Pie</button>
    <button data-tpl="mindmap">Mindmap</button>
    <button data-tpl="timeline">Timeline</button>
    <button data-tpl="journey">Journey</button>
    <button data-tpl="git">Git</button>
  </div>
  <div class="actions">
    <button id="btn-examples" title="Browse example diagrams">Examples</button>
    <button id="btn-theme" class="icon-btn" title="Toggle dark mode (D)" aria-label="Toggle dark mode" aria-pressed="false">🌓</button>
    <button id="btn-share" title="Copy shareable link">Share</button>
    <div class="menu" id="export-menu">
      <button id="btn-export" class="menu-trigger" aria-haspopup="true" aria-expanded="false" title="Export diagram">
        Export <span class="caret">▾</span>
      </button>
      <div class="menu-list" id="export-list" role="menu" hidden>
        <button role="menuitem" data-export="svg">SVG</button>
        <button role="menuitem" data-export="png-1">PNG · 1×</button>
        <button role="menuitem" data-export="png-2">PNG · 2×</button>
        <button role="menuitem" data-export="png-4">PNG · 4×</button>
        <div class="menu-sep"></div>
        <button role="menuitem" data-export="copy-png">Copy PNG to clipboard</button>
      </div>
    </div>
  </div>
</header>

<main id="main">
  <section class="pane editor-pane" id="editor-pane">
    <aside class="palette" id="palette">
      <button class="palette-toggle" id="palette-toggle" title="Toggle palette" aria-label="Toggle palette" aria-expanded="true">⊟</button>
      <div class="palette-body" id="palette-body">
        <div class="palette-group">
          <div class="palette-group-title">Shapes</div>
          <button class="palette-item" data-snip="rect" title="Process (rectangle)"><span class="pi-glyph">▭</span><span class="pi-label">Process</span></button>
          <button class="palette-item" data-snip="rounded" title="Rounded box"><span class="pi-glyph">▢</span><span class="pi-label">Rounded</span></button>
          <button class="palette-item" data-snip="stadium" title="Terminal / start-end (stadium)"><span class="pi-glyph">⬭</span><span class="pi-label">Terminal</span></button>
          <button class="palette-item" data-snip="decision" title="Decision (diamond)"><span class="pi-glyph">◇</span><span class="pi-label">Decision</span></button>
          <button class="palette-item" data-snip="database" title="Database (cylinder)"><span class="pi-glyph">⛁</span><span class="pi-label">Database</span></button>
          <button class="palette-item" data-snip="queue" title="Queue (hexagon)"><span class="pi-glyph">⬡</span><span class="pi-label">Queue</span></button>
          <button class="palette-item" data-snip="circle" title="Circle"><span class="pi-glyph">◯</span><span class="pi-label">Circle</span></button>
          <button class="palette-item" data-snip="subgraph" title="Subgraph container"><span class="pi-glyph">⬚</span><span class="pi-label">Subgraph</span></button>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">Connectors</div>
          <button class="palette-item" data-snip="arrow" title="Arrow edge"><span class="pi-glyph">→</span><span class="pi-label">Arrow</span></button>
          <button class="palette-item" data-snip="labeled" title="Labeled edge"><span class="pi-glyph">⇥</span><span class="pi-label">Labeled</span></button>
          <button class="palette-item" data-snip="dashed" title="Dashed (async) edge"><span class="pi-glyph">⇢</span><span class="pi-label">Dashed</span></button>
          <button class="palette-item" data-snip="thick" title="Thick (hot path) edge"><span class="pi-glyph">⇒</span><span class="pi-label">Thick</span></button>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">Infra</div>
          <div class="palette-icon-grid" id="palette-infra"></div>
        </div>
      </div>
    </aside>
    <div class="editor-col">
      <div class="editor-bar">
        <span class="editor-bar-label">EDITOR</span>
        <span id="type-badge" class="type-badge" data-type="">—</span>
      </div>
      <div class="editor-scroll" id="editor-scroll">
        <div class="gutter" id="gutter" aria-hidden="true"></div>
        <textarea id="editor" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
      </div>
      <div id="status" class="status ok">ready</div>
    </div>
  </section>
  <div id="splitter" role="separator" aria-orientation="vertical" title="Drag to resize"></div>
  <section class="pane preview-pane" id="preview-pane">
    <div id="viewport"><div id="preview"></div></div>
    <div id="minimap" class="minimap" hidden title="Drag to navigate">
      <div id="minimap-canvas"></div>
      <div id="minimap-view"></div>
    </div>
    <div class="zoom-controls">
      <button id="zoom-out" title="Zoom out (−)">−</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in" title="Zoom in (+)">+</button>
      <button id="zoom-fit" title="Fit to view (0)">Fit</button>
    </div>
  </section>
</main>

<!-- Examples gallery: starter diagrams (one per type + AWS architecture).
     Shown on first load / empty editor, or via the Examples button. -->
<div id="gallery" class="gallery" hidden>
  <div class="gallery-backdrop"></div>
  <div class="gallery-panel" role="dialog" aria-modal="true" aria-labelledby="gallery-title">
    <div class="gallery-head">
      <div>
        <h2 id="gallery-title">Start with an example</h2>
        <p class="gallery-sub">Pick a starting point — every diagram is fully editable.</p>
      </div>
      <button id="gallery-close" class="gallery-close" aria-label="Close gallery" title="Close (Esc)">✕</button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="gallery-foot">
      <button id="gallery-blank" class="gallery-blank">Start from a blank canvas</button>
    </div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
